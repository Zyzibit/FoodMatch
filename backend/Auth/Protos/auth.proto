syntax = "proto3";

option csharp_namespace = "inzynierka.Auth.Grpc";

package auth;

service AuthService {
  rpc ValidateToken (ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc GetUserInfo (GetUserInfoRequest) returns (GetUserInfoResponse);
  rpc RefreshToken (RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc RevokeToken (RevokeTokenRequest) returns (RevokeTokenResponse);
  rpc ChangePassword (ChangePasswordGrpcRequest) returns (ChangePasswordResponse);
  rpc UpdateProfile (UpdateProfileGrpcRequest) returns (UpdateProfileResponse);
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool is_valid = 1;
  string user_id = 2;
  string username = 3;
  repeated string roles = 4;
}

message GetUserInfoRequest {
  string user_id = 1;
}

message GetUserInfoResponse {
  string user_id = 1;
  string username = 2;
  string email = 3;
  repeated string roles = 4;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  bool success = 1;
  string access_token = 2;
  string refresh_token = 3;
  int64 expires_at = 4;
  string error_message = 5;
}

message RevokeTokenRequest {
  string refresh_token = 1;
}

message RevokeTokenResponse {
  bool success = 1;
  string message = 2;
}

message ChangePasswordGrpcRequest {
  string user_id = 1;
  string current_password = 2;
  string new_password = 3;
}

message ChangePasswordResponse {
  bool success = 1;
  string message = 2;
}

message UpdateProfileGrpcRequest {
  string user_id = 1;
  string email = 2;
  string name = 3;
}

message UpdateProfileResponse {
  bool success = 1;
  string message = 2;
}