syntax = "proto3";

option csharp_namespace = "inzynierka.Products.Grpc";

package products;

service ProductService {
  rpc GetProduct (GetProductRequest) returns (GetProductResponse);
  rpc SearchProducts (SearchProductsRequest) returns (SearchProductsResponse);
  rpc GetProductsByCategory (GetProductsByCategoryRequest) returns (GetProductsByCategoryResponse);
  rpc ImportProducts (ImportProductsRequest) returns (ImportProductsResponse);
}

message GetProductRequest {
  string product_id = 1;
}

message GetProductResponse {
  Product product = 1;
}

message SearchProductsRequest {
  string query = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message SearchProductsResponse {
  repeated Product products = 1;
  int32 total_count = 2;
}

message GetProductsByCategoryRequest {
  string category = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message GetProductsByCategoryResponse {
  repeated Product products = 1;
  int32 total_count = 2;
}

message ImportProductsRequest {
  string file_path = 1;
  int32 max_products = 2;
  int32 batch_size = 3;
}

message ImportProductsResponse {
  bool success = 1;
  string message = 2;
  int32 imported_count = 3;
}

message Product {
  string id = 1;
  string name = 2;
  string brand = 3;
  string barcode = 4;
  repeated string categories = 5;
  repeated string ingredients = 6;
  repeated string allergens = 7;
  repeated string countries = 8;
  string image_url = 9;
}