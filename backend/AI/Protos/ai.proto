syntax = "proto3";

option csharp_namespace = "inzynierka.AI.Grpc";

package ai;

service AIService {
  rpc GenerateResponse (GenerateResponseRequest) returns (GenerateResponseResponse);
  rpc GenerateJson (GenerateJsonRequest) returns (GenerateJsonResponse);
  rpc AnalyzeProduct (AnalyzeProductRequest) returns (AnalyzeProductResponse);
}

message GenerateResponseRequest {
  repeated ChatMessage messages = 1;
  string model = 2;
}

message GenerateResponseResponse {
  string response = 1;
  string model_used = 2;
}

message GenerateJsonRequest {
  repeated ChatMessage messages = 1;
  string schema = 2;
}

message GenerateJsonResponse {
  string json_response = 1;
  bool is_valid_json = 2;
}

message AnalyzeProductRequest {
  string product_id = 1;
  string analysis_type = 2;
}

message AnalyzeProductResponse {
  string analysis_result = 1;
  double confidence_score = 2;
}

message ChatMessage {
  string role = 1;
  string content = 2;
}